# .github/workflows/ci.yml — CI quality + supply-chain gate (Task 8, F-10, F-09).
# Additive, standalone workflow: it does not modify or depend on the pre-existing daily
# data-refresh cron workflow (a don't-touch zone — AGENTS.md §6). Least privilege: read-only
# token (baseline §4). Third-party actions are pinned by commit SHA (baseline §5 — "actions
# pinned to tag or SHA"; we pin to SHA, the stronger form).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token (baseline §4 / §5). No write scopes anywhere.
permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, test, build, audit + dist guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node 22 (LTS)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'

      # Canon build command prerequisite: clean install from the committed lockfile.
      - name: Install (npm ci)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (astro check && tsc --noEmit)
        run: npm run typecheck

      - name: Unit tests (vitest run)
        run: npm test

      # Supply chain: fail the build on any HIGH/CRITICAL advisory (baseline §4).
      - name: npm audit (fail on high)
        run: npm audit --audit-level=high

      - name: Build (static dist/)
        run: npm run build

      # ---- dist privacy guards (AGENTS.md §7, baseline §5) — each must yield ZERO matches ----
      - name: Guard — no email-pattern leak in dist/
        run: '! grep -RnIE "[A-Za-z0-9._%+-]+@[A-Za-z0-9-]+\.[A-Za-z]{2,}" dist/'

      - name: Guard — no email-protocol links in src/public/functions/dist
        run: '! grep -rn "mailto:" src/ public/ functions/ dist/'

      # ---- CSP guards (D-3, F-10.4) — expect ZERO matches each ----
      - name: Guard — no executable inline script bodies in dist HTML
        run: '! (grep -rn "<script" dist/ --include="*.html" | grep -v "src=" | grep -v "application/ld+json")'

      - name: Guard — only challenges.cloudflare.com as a third-party script
        run: '! (grep -rnoE "<script[^>]+src=\"https?://[^\"]+\"" dist/ --include="*.html" | grep -v "challenges.cloudflare.com")'

      # ---- Account separation (baseline §3d) — every gitlab *host* must be gitlab.com ----
      # Scoped to URL/host occurrences so legitimate identifiers (gitlabUsername, GitLabProject)
      # are not flagged; the real invariant is "no self-hosted/company GitLab host".
      - name: Guard — every GitLab host reference is gitlab.com
        run: '! (grep -rnoiE "https?://[a-z0-9.-]*gitlab[a-z0-9.-]*" src/ functions/ | grep -viE "gitlab\.com")'

      # ---- Islands budget (AGENTS.md §4) — exactly the three approved islands ----
      - name: Guard — exactly 3 islands
        run: |
          count="$(ls -1 src/islands | wc -l | tr -d ' ')"
          test "$count" -eq 3
          ls -1 src/islands

      # ---- Initial-JS budget (F-09.4) — gzip sum of all dist JS must be < 51200 bytes ----
      - name: Guard — initial JS < 50 KB gzipped
        run: |
          total=0
          while IFS= read -r f; do
            s=$(gzip -c "$f" | wc -c)
            total=$((total + s))
          done < <(find dist -name "*.js")
          echo "initial JS: ${total} bytes gz"
          test "$total" -lt 51200

      - name: Upload dist artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dist
          path: dist/
          retention-days: 1

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # Pinned by SHA (baseline §5). Scans the repo/diff for secret-looking literals.
      # gitleaks-action v2 requires GITHUB_TOKEN to determine the PR commit range.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lighthouse:
    name: Lighthouse hard gate (>= 0.95 mobile)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node 22 (LTS)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install (npm ci)
        run: npm ci

      - name: Build (static dist/)
        run: npm run build

      # F-09 hard gate: performance/accessibility/best-practices/seo >= 0.95, LCP < 2000ms,
      # CLS < 0.1, against the built static dist/. Assertions live in lighthouserc.json
      # (canonical [level, {minScore|maxNumericValue}] form; autorun auto-discovers it).
      # @lhci/cli pinned to a minor range (0.15.x is current latest; 0.16.x does not exist).
      - name: Lighthouse CI (assertions >= 0.95)
        run: npx @lhci/cli@0.15.x autorun
